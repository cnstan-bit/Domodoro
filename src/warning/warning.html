<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Domodoro Warning</title>
    <link rel="stylesheet" href="./warning.css" />
  </head>
  <body>
    <main class="warning-shell">
      <section class="warning-copy">
        <span id="warningEyebrow" class="eyebrow">DOMODORO WARNING</span>
        <h1 id="warningTitle">一分钟后强制休息</h1>
        <p id="warningLine">收尾，保存，停手。别等我亲自锁屏。</p>
        <strong id="warningCountdown">01:00</strong>
        <div class="warning-track"><span id="warningProgress"></span></div>
      </section>
      <aside class="warning-persona">
        <img id="warningPersonaImage" src="../assets/personas/discipline-officer-training.png" alt="纪律调教官" />
      </aside>
    </main>
    <script src="./warning.js"></script>
  </body>
</html>

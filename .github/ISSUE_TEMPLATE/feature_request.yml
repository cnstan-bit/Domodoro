name: Feature request
description: Suggest a new workflow, persona, or overlay pack.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature, overlay pack, or behavior change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Overlay Pack
        - Persona
        - Timer workflow
        - Accessibility
        - Packaging
        - Other

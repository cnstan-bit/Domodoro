name: Bug report
description: Report something broken in Domodoro.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Timer
        - Warning window
        - Break overlay
        - Language switch
        - Packaging / installer
        - Other
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Start focus\n2. Wait for warning\n3. ..."

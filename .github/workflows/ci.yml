name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: JavaScript syntax check
        shell: pwsh
        run: |
          Get-ChildItem -Path .\src,.\test -Recurse -Filter *.js |
            ForEach-Object { node --check $_.FullName }
